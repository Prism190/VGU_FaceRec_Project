experiment:
  name: mobilenetv4_magface_kd_ms1m_v1_warmup5
  output_root: runs/ms1m_v1_warmup5
  seed: 3407

system:
  use_amp: true
  use_dali: true
  dali_aug: true
  dali_num_threads: 2
  dali_prefetch_queue_depth: 1
  dali_initial_fill: 32768
  dali_random_shuffle: true
  num_workers: 16
  use_dataloaderx: true
  recordio_num_workers: 8
  recordio_decode_retries: 64
  pin_memory: true
  cudnn_benchmark: true

distributed:
  enabled: true

data:
  image_size: 112
  mean: [0.5, 0.5, 0.5]
  std: [0.5, 0.5, 0.5]
  hflip_prob: 0.5
  mask_prob: 0.15
  mask_fill: zero
  use_clahe: false
  train_manifest: data/manifests/ms1m_clean_train.csv
  val_sets:
    - name: lfw
      pairs_csv: data/manifests/lfw_pairs.csv
    - name: cfp_fp
      pairs_csv: data/manifests/cfp_fp_pairs.csv
    - name: agedb30
      pairs_csv: data/manifests/agedb30_pairs.csv
  ijb:
    protocol_csv: data/manifests/ijb_1to1_pairs.csv
    ijbb_root: data/raw/ijb/ijb/IJBB
    ijbc_root: data/raw/ijb/ijb/IJBC

teacher:
  source: magface
  arch: iresnet100
  model_name: ""
  checkpoint: checkpoints/pretrained/magface_iresnet100_ms1mv2.pth
  embedding_dim: 512
  input_mode: from_minus_one_to_zero_one
  swap_rb: false

student:
  backbone_name: mobilenetv4_conv_small.e2400_r224_in1k
  pretrained: true
  embedding_dim: 512
  projection_activation: none

margin_head:
  type: magface
  scale: 64.0
  margin: 0.35
  magface_margin_min: 0.30
  magface_margin_max: 0.50
  feature_norm_lower: 10.0
  feature_norm_upper: 110.0
  regularizer_lambda: 35.0

loss:
  lambda_cls: 1.0
  lambda_kd_start: 1.0
  lambda_kd_end: 2.5
  kd_ramp_epochs: 3
  lambda_rkd_distance: 0.0
  lambda_rkd_angle: 0.0

optim:
  lr: 0.1
  momentum: 0.9
  nesterov: false
  weight_decay: 0.0001
  grad_clip_norm: 5.0

scheduler:
  # 5-epoch warmup run: 1-epoch linear warmup then flat LR (no step drops within 5 epochs)
  milestones: []
  gamma: 0.1
  warmup_epochs: 1
  warmup_start_factor: 0.01

train:
  epochs: 5
  batch_size_per_gpu: 256
  auto_resume: true
  resume_from: auto
  # Or pin a specific checkpoint path:
  # resume_from: runs/ms1m_v1_warmup5/checkpoints/latest.pt
  show_progress_bar: true
  log_interval: 100
  save_every: 1
  eval_every: 1
  best_metric: mean_roc_auc

metrics:
  target_fars: [0.001, 0.0001, 0.00001]
