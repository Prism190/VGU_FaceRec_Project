experiment:
  name: mobilenetv4_arcface_kd_ms1m_allin_v3_gate12
  output_root: runs/ms1m_arcface_allin_v3_gate12
  seed: 3407

system:
  use_amp: false
  use_dali: true
  dali_aug: true
  dali_num_threads: 2
  dali_prefetch_queue_depth: 1
  dali_initial_fill: 32768
  dali_random_shuffle: true
  num_workers: 16
  use_dataloaderx: true
  recordio_num_workers: 8
  recordio_decode_retries: 64
  pin_memory: true
  cudnn_benchmark: true

distributed:
  enabled: true

data:
  image_size: 112
  mean: [0.5, 0.5, 0.5]
  std: [0.5, 0.5, 0.5]
  hflip_prob: 0.5
  mask_prob: 0.10
  mask_fill: zero
  use_clahe: false
  train_manifest: data/manifests/ms1m_clean_train.csv
  val_sets:
    - name: lfw
      pairs_csv: data/manifests/lfw_pairs.csv
    - name: cfp_fp
      pairs_csv: data/manifests/cfp_fp_pairs.csv
    - name: agedb30
      pairs_csv: data/manifests/agedb30_pairs.csv
  ijb:
    protocol_csv: data/manifests/ijb_1to1_pairs.csv
    ijbb_root: data/raw/ijb/ijb/IJBB
    ijbc_root: data/raw/ijb/ijb/IJBC

teacher:
  source: magface
  arch: iresnet100
  model_name: ""
  checkpoint: checkpoints/pretrained/magface_iresnet100_ms1mv2.pth
  embedding_dim: 512
  input_mode: from_minus_one_to_zero_one
  swap_rb: false

student:
  backbone_name: mobilenetv4_conv_small.e2400_r224_in1k
  pretrained: true
  embedding_dim: 512
  projection_activation: none

margin_head:
  type: arcface
  scale: 64.0
  margin: 0.50

loss:
  lambda_cls: 1.0
  lambda_kd_start: 0.5
  lambda_kd_end: 1.0
  kd_ramp_epochs: 10
  lambda_rkd_distance: 0.0
  lambda_rkd_angle: 0.0

optim:
  lr: 0.02
  momentum: 0.9
  nesterov: false
  weight_decay: 0.0001
  grad_clip_norm: 1.0

scheduler:
  # Milestones are absolute epoch numbers (not relative to warmup end)
  milestones: [9, 12]
  gamma: 0.1
  warmup_epochs: 3
  warmup_start_factor: 0.01

train:
  epochs: 12
  batch_size_per_gpu: 256
  auto_resume: true
  resume_from: none
  show_progress_bar: true
  log_interval: 100
  save_every: 2
  eval_every: 1
  best_metric: mean_tar_far_1e-4
  early_stop_patience: 3

metrics:
  target_fars: [0.001, 0.0001, 0.00001]